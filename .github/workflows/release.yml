name: Build and Release macOS App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: macos-latest

    env:
      APP_NAME: RelaxTimer
      SCHEME: RelaxTimer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG_NAME=$GITHUB_REF_NAME" >> "$GITHUB_ENV"

      - name: Build app
        run: |
          xcodebuild \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Download Sparkle tools
        run: |
          curl -L https://github.com/sparkle-project/Sparkle/releases/latest/download/Sparkle.tar.xz -o sparkle.tar.xz
          tar -xf sparkle.tar.xz
          echo "SPARKLE_TOOLS_DIR=$(pwd)/Sparkle" >> $GITHUB_ENV

      - name: Export Sparkle private key to file
        run: |
          cat > "$RUNNER_TEMP/sparkle_private_key.pem" <<'EOF'
          ${{ secrets.SPARKLE_PRIVATE_KEY }}
          EOF
          echo "SPARKLE_PRIVATE_KEY_FILE=$RUNNER_TEMP/sparkle_private_key.pem" >> "$GITHUB_ENV"

      - name: Create update archive
        run: |
          mkdir -p updates
          ditto -c -k --sequesterRsrc --keepParent \
            "build/Build/Products/Release/$APP_NAME.app" \
            "updates/$APP_NAME-$VERSION.zip"

      - name: Generate appcast
        run: |
          "$SPARKLE_TOOLS_DIR/bin/generate_appcast" \
            --ed-key-file "$SPARKLE_PRIVATE_KEY_FILE" \
            updates

      - name: Add latest alias page content
        run: |
          cp "updates/appcast.xml" "updates/appcast.xml"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: updates

  deploy-pages:
    needs: build-and-publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
