name: Build and Release macOS App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: macos-latest

    env:
      APP_NAME: RelaxTimer
      SCHEME: RelaxTimer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG_NAME=$GITHUB_REF_NAME" >> "$GITHUB_ENV"

      - name: Build app
        run: |
          xcodebuild \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Read build number from built app
        run: |
          BUILD_NUMBER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "build/Build/Products/Release/$APP_NAME.app/Contents/Info.plist")
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Prepare release folder
        run: |
          mkdir -p updates
          cp -R "build/Build/Products/Release/$APP_NAME.app" "./$APP_NAME.app"

      - name: Create installer scripts
        run: |
          mkdir -p pkg-scripts
          cat > pkg-scripts/postinstall <<'EOF'
          #!/bin/bash
          APP_NAME="RelaxTimer"

          /usr/bin/pkill -x "$APP_NAME" || true
          /bin/sleep 2
          /usr/bin/open "/Applications/$APP_NAME.app" || true

          exit 0
          EOF
          chmod +x pkg-scripts/postinstall

      - name: Build installer package
        run: |
          pkgbuild \
            --component "./$APP_NAME.app" \
            --install-location "/Applications" \
            --scripts "pkg-scripts" \
            "updates/$APP_NAME-$VERSION.pkg"

      - name: Create latest.json
        run: |
          cat > "updates/latest.json" <<EOF
          {
            "version": "$VERSION",
            "build": "$BUILD_NUMBER",
            "pkg_url": "https://yongmingfan.github.io/RelaxTimer/$APP_NAME-$VERSION.pkg"
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: updates/*.pkg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: updates

  deploy-pages:
    needs: build-and-publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
