name: Build and Release macOS App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: macos-latest

    env:
      APP_NAME: RelaxTimer
      SCHEME: RelaxTimer
      SPARKLE_VERSION: 2.9.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG_NAME=$GITHUB_REF_NAME" >> "$GITHUB_ENV"

      - name: Build app
        run: |
          xcodebuild \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Setup Sparkle tools
        run: |
          mkdir -p .action/sparkle
          cd .action/sparkle
          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-for-Swift-Package-Manager.zip" -o sparkle.zip
          unzip -q sparkle.zip
          echo "$(pwd)/bin" >> "$GITHUB_PATH"

      - name: Export Sparkle private key to file
        run: |
          cat > "$RUNNER_TEMP/sparkle_private_key.pem" <<'EOF'
          ${{ secrets.SPARKLE_PRIVATE_KEY }}
          EOF
          echo "SPARKLE_PRIVATE_KEY_FILE=$RUNNER_TEMP/sparkle_private_key.pem" >> "$GITHUB_ENV"

      - name: Create update archive
        run: |
          mkdir -p updates
          ditto -c -k --sequesterRsrc --keepParent \
            "build/Build/Products/Release/$APP_NAME.app" \
            "updates/$APP_NAME-$VERSION.zip"

      - name: Generate appcast
        run: |
          generate_appcast \
            --ed-key-file "$SPARKLE_PRIVATE_KEY_FILE" \
            updates

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: updates

  deploy-pages:
    needs: build-and-publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
